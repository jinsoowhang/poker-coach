<!DOCTYPE html>
<html>
<head>
  <script>
    var repo = '/poker-coach';
    var path = window.location.pathname;
    if (path.startsWith(repo)) {
      path = path.slice(repo.length);
    }
    window.location.replace(repo + '/?redirect=' + encodeURIComponent(path + window.location.search));
  </script>
</head>
<body></body>
</html>
